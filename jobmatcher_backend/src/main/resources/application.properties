spring.application.name=jobmatcher_backend

# Database Configuration (Injected dynamically by Render/Laptop)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/job_matcher_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# In production, change this to "none" or use a proper migration tool like Flyway
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Security Configuration
jwt.secret=${JWT_SECRET:JobGenius_Secret_Key_987654321_Secure}

# NVIDIA NIM AI Configuration
nvidia.nim.api.key=${NVIDIA_NIM_API_KEY}
nvidia.nim.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.nim.model=meta/llama-3.1-8b-instruct
nvidia.nim.max.tokens=200

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads/resumes
file.profile-image-dir=uploads/profile-images
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ATS Scoring Weights
ats.weight.skills=60
ats.weight.experience=20
ats.weight.projects=10
ats.weight.strength=10

# Email Integration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Branding & Dynamic Frontend Routing
app.mail.from=${SPRING_MAIL_USERNAME}
app.mail.from-name=JobGenius
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}